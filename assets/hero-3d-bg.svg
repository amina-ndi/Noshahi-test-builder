<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="130" y1="80" x2="1790" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#E9F3FE"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <radialGradient id="haloBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1380 250) rotate(132) scale(520 520)">
      <stop stop-color="#0693E3" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#0693E3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(430 860) rotate(20) scale(440 440)">
      <stop stop-color="#FFB800" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plateGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#DCEBFF" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="blur90" x="-200" y="-200" width="2320" height="1480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="shadow" x="0" y="0" width="1920" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="25" stdDeviation="25" flood-color="#004B93" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1380" cy="250" r="520" fill="url(#haloBlue)"/>
  <circle cx="430" cy="860" r="440" fill="url(#haloGold)"/>

  <g filter="url(#blur90)" opacity="0.52">
    <circle cx="1260" cy="620" r="210" fill="#0693E3"/>
    <circle cx="760" cy="280" r="180" fill="#004B93"/>
    <circle cx="980" cy="780" r="170" fill="#FFB800"/>
  </g>

  <g filter="url(#shadow)" opacity="0.9">
    <g transform="translate(340 170)">
      <rect x="0" y="0" width="1240" height="740" rx="40" fill="url(#plateGrad)" stroke="#FFFFFF" stroke-opacity="0.5"/>
      <rect x="70" y="84" width="456" height="255" rx="24" fill="#FFFFFF" fill-opacity="0.7" stroke="#D2E6FF"/>
      <rect x="554" y="84" width="616" height="76" rx="18" fill="#F4F9FF" stroke="#D6E9FF"/>
      <rect x="554" y="184" width="616" height="76" rx="18" fill="#F4F9FF" stroke="#D6E9FF"/>
      <rect x="554" y="284" width="616" height="76" rx="18" fill="#F4F9FF" stroke="#D6E9FF"/>

      <rect x="70" y="380" width="1100" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.72" stroke="#CFE3FF"/>
      <rect x="70" y="484" width="980" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.72" stroke="#CFE3FF"/>
      <rect x="70" y="588" width="880" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.72" stroke="#CFE3FF"/>
    </g>
  </g>

  <g opacity="0.9">
    <circle cx="1110" cy="143" r="7" fill="#FFB800"/>
    <circle cx="1132" cy="143" r="7" fill="#004B93"/>
    <circle cx="1154" cy="143" r="7" fill="#0693E3"/>
  </g>
</svg>
