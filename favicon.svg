<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <defs>
        <linearGradient id="neonGradi" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F0FF" />
            <stop offset="100%" stop-color="#7000FF" />
        </linearGradient>
        <linearGradient id="neonGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF00A0" />
            <stop offset="100%" stop-color="#7000FF" />
        </linearGradient>
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <g filter="url(#neonGlow)">
        <!-- A beautiful 3D isometric cube structure -->
        <polygon points="50,15 85,35 85,75 50,95 15,75 15,35" fill="rgba(0,240,255,0.15)" stroke="url(#neonGradi)" stroke-width="6" stroke-linejoin="round" />
        <path d="M50,15 L50,55 M15,35 L50,55 M85,35 L50,55" stroke="url(#neonGrad2)" stroke-width="5" stroke-linecap="round" />
        <circle cx="50" cy="55" r="8" fill="url(#neonGradi)" />
        <circle cx="50" cy="15" r="4" fill="#00F0FF" />
        <circle cx="15" cy="35" r="3" fill="#FF00A0" />
        <circle cx="85" cy="35" r="3" fill="#00F0FF" />
    </g>
</svg>
